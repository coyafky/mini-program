<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>加盟我们</title>
<link rel="stylesheet" href="styles.css">
<script src="router.js"></script>
</head>
<body>
  <div class="topnav"><div class="nav-icon" onclick="go('profile')">‹</div><div class="nav-title">加盟我们</div><div class="nav-icon"></div></div>
  <div class="card">
    <div class="card-pad">
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">提交加盟意向</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px">填写联系人、电话、意向城市、门店地址和营业照片后，后台可以收到加盟线索并进一步联系。</div>
      <div class="form-field"><div class="form-label"><span class="required">*</span> 联系人姓名</div><input class="input-field" placeholder="请输入联系人姓名"></div>
      <div class="form-field"><div class="form-label"><span class="required">*</span> 联系电话</div><input class="input-field" placeholder="请输入联系电话"></div>
      <div class="form-field"><div class="form-label"><span class="required">*</span> 意向城市</div><input class="input-field" placeholder="如：深圳 / 广州 / 佛山"></div>
      <div class="form-field"><div class="form-label">门店地址</div><input class="input-field" placeholder="请输入门店详细地址"></div>
      <div class="form-field"><div class="form-label">营业照片</div><div class="input-field" style="display:flex;align-items:center;justify-content:center;height:100px;color:var(--muted)">点击上传门店门头 / 店内环境照片</div></div>
      <div class="form-field"><div class="form-label">补充说明</div><textarea class="input-field" rows="5" style="height:110px;resize:none" placeholder="可补充当前经营情况、经营面积、合作诉求"></textarea></div>
      <button class="btn-primary">提交加盟意向</button>
    </div>
  </div>
</body>
</html>
