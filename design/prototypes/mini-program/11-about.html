<!doctype html>
<html lang="zh-CN">
<head>

<title>关于我们</title>
<link rel="stylesheet" href="styles.css">
<script src="router.js"></script>
<style>
  .hero { margin: 12px 16px 0; background: linear-gradient(135deg,#6c4920,#d8a04a); border-radius: 18px; padding: 22px 18px; color:#fff; }
  .hero h1 { font-size: 24px; margin-bottom: 8px; }
  .hero p { font-size: 13px; line-height: 1.7; opacity: 0.92; }
  .box { margin: 12px 16px 0; background: var(--surface); border-radius: 16px; padding: 16px; }
  .box h3 { font-size: 16px; margin-bottom: 10px; }
  .box p, .box li { font-size: 13px; color: var(--muted); line-height: 1.8; }
</style>
</head>
<body>
  <div class="topnav"><div class="nav-icon" onclick="go('profile')">‹</div><div class="nav-title">关于我们</div><div class="nav-icon"></div></div>
  <div class="hero">
    <h1>蓝辉轻改</h1>
    <p>蓝辉轻改聚焦汽车轻改装服务，通过小程序帮助用户线上了解项目、选择门店、提交预约，再由总部统一处理并分发给门店承接施工。</p>
  </div>
  <div class="box">
    <h3>品牌定位</h3>
    <p>我们不是传统大改装，而是围绕座舱舒适、外观防护、影音娱乐、轻户外等场景，做更标准、更好理解、更适合线上预约的轻改装服务。</p>
  </div>
  <div class="box">
    <h3>服务流程</h3>
    <p>首页了解项目 → 选择门店 → 浏览商品与套餐 → 提交预约单 → 总部确认 → 门店施工服务 → 售后跟进。</p>
  </div>
  <div class="box">
    <h3>品牌优势</h3>
    <ul>
      <li>统一标准化项目配置与图文展示</li>
      <li>总部统一处理预约与线索分发</li>
      <li>门店专注接待与施工服务</li>
      <li>适配品牌、车型、套餐三种导购路径</li>
    </ul>
  </div>
</body>
</html>
