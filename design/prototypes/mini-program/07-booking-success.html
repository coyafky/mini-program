<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>预约提交成功</title>
<link rel="stylesheet" href="styles.css">
<script src="router.js"></script>
<style>
  .hero {
    background: var(--surface);
    padding: 36px 16px 24px;
    text-align: center;
  }
  .ok {
    width: 82px; height: 82px; border-radius: 50%;
    background: var(--success); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; margin: 0 auto 16px;
  }
  .title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .sub { font-size: 13px; color: var(--muted); line-height: 1.7; }
  .info-card {
    background: var(--surface);
    border-radius: 16px;
    margin: 12px 16px 0;
    overflow: hidden;
  }
  .info-head { padding: 14px 16px; font-size: 13px; color: var(--muted); border-bottom: 1px solid var(--border); }
  .info-row {
    display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row .label { width: 72px; color: var(--muted); flex-shrink: 0; }
  .item-list { padding: 0 16px 12px; }
  .item-line { padding: 10px 0; border-bottom: 1px dashed var(--border); font-size: 13px; line-height: 1.7; }
  .item-line:last-child { border-bottom: none; }
  .btn-row { display: flex; gap: 10px; padding: 16px; }
  .btn-row button { flex: 1; }
</style>
</head>
<body>
  <div class="hero">
    <div class="ok">✓</div>
    <div class="title">预约提交成功</div>
    <div class="sub">你的预约需求已经提交，系统已生成预约单号。<br>总部或门店会尽快电话联系确认。</div>
  </div>

  <div class="info-card">
    <div class="info-head">预约信息</div>
    <div class="info-row"><div class="label">预约单号</div><div id="bookingNo">LH20260513</div></div>
    <div class="info-row"><div class="label">预约项目</div><div id="bookingItemSummary">共 1 个项目</div></div>
    <div class="info-row"><div class="label">到店门店</div><div id="bookingStore">蓝辉轻改（深圳南山店）</div></div>
    <div class="info-row"><div class="label">预约时间</div><div id="bookingTime">2026-05-13 · 上午</div></div>
    <div class="info-row"><div class="label">车型</div><div id="bookingCar">问界M9 2024款</div></div>
    <div class="item-list" id="bookingItems"></div>
  </div>

  <div class="info-card">
    <div class="info-head">后续说明</div>
    <div class="info-row"><div class="label">处理状态</div><div>待总部确认分发门店</div></div>
    <div class="info-row"><div class="label">提醒</div><div>请保持电话畅通，如需改约可在“我的预约”中查看详情。</div></div>
  </div>

  <div class="btn-row">
    <button class="btn-secondary" onclick="go('booking-history')">查看我的预约</button>
    <button class="btn-primary" onclick="go('home')">返回首页</button>
  </div>

  <div class="tabbar">
    <div class="tabbar-item" onclick="go('home')"><span class="tab-icon">🏠</span>首页</div>
    <div class="tabbar-item" onclick="go('category')"><span class="tab-icon">📂</span>分类</div>
    <div class="tabbar-item" onclick="go('store')"><span class="tab-icon">🏪</span>门店</div>
    <div class="tabbar-item" onclick="go('booking-list')"><span class="tab-icon">📋</span>预约单</div>
    <div class="tabbar-item active" onclick="go('profile')"><span class="tab-icon">👤</span>我的</div>
  </div>

<script>
const draft = getLastReservation();
if (draft) {
  document.getElementById('bookingNo').textContent = draft.bookingNo || 'LH20260513';
  document.getElementById('bookingStore').textContent = draft.storeName || '蓝辉轻改（深圳南山店）';
  document.getElementById('bookingTime').textContent = `${draft.visitDate || '2026-05-13'} · ${draft.timeSlot || '上午'}`;
  document.getElementById('bookingCar').textContent = draft.carModel || '问界M9 2024款';
  const items = Array.isArray(draft.items) && draft.items.length ? draft.items : [{ name: '问界M9升级权益包｜鲲鹏展翅【商务版】套餐', spec: '', quantity: 1 }];
  document.getElementById('bookingItemSummary').textContent = `共 ${items.reduce((sum, item) => sum + (item.quantity || 1), 0)} 个项目`;
  document.getElementById('bookingItems').innerHTML = items.map(item => `
    <div class="item-line">${item.name}<br><span style="color:var(--muted)">规格：${item.spec || '标准版'} · 数量：${item.quantity || 1}</span></div>
  `).join('');
}
</script>
</body>
</html>
