<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>联系客服</title>
<link rel="stylesheet" href="styles.css">
<script src="router.js"></script>
<style>
  .box { margin: 12px 16px 0; background: var(--surface); border-radius: 16px; padding: 16px; }
  .box h3 { font-size: 16px; margin-bottom: 12px; }
  .qr {
    height: 180px; border-radius: 16px; background: linear-gradient(135deg,#f4eadb,#efe2c8);
    display:flex; align-items:center; justify-content:center; font-size: 60px; margin-bottom: 12px;
  }
  .line { display:flex; justify-content:space-between; padding: 10px 0; border-bottom:1px solid var(--border); font-size: 14px; }
  .line:last-child { border-bottom:none; }
  .line .label { color: var(--muted); }
</style>
</head>
<body>
  <div class="topnav"><div class="nav-icon" onclick="go('profile')">‹</div><div class="nav-title">联系客服</div><div class="nav-icon"></div></div>
  <div class="box">
    <h3>客服微信</h3>
    <div class="qr">💬</div>
    <button class="btn-primary">保存客服二维码</button>
  </div>
  <div class="box">
    <h3>联系信息</h3>
    <div class="line"><div class="label">联系电话</div><div>400-888-1234</div></div>
    <div class="line"><div class="label">服务时间</div><div>09:00 - 18:30</div></div>
    <div class="line"><div class="label">总部邮箱</div><div>service@lanhui.com</div></div>
  </div>
</body>
</html>
